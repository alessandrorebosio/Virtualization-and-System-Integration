name: cloud-prod

services:
  nginx:
    container_name: nginx-proxy
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

  web:
    container_name: web-app-prod
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: always
    expose:
      - "3000"
